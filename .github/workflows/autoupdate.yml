name: Update Launcher

on:
  workflow_dispatch:
    tag:
      description: 'Tag'
      required: true
      type: string

env:
  GIT_AUTHOR_NAME: github-actions[bot]
  GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

jobs:
  update-launcher:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        branch: [ master ]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Download flatpak-builder-tools
        run: |
          git clone -b master https://github.com/flatpak/flatpak-builder-tools ../builder-tools

      - name: Get sleepy launcher repo
        run: |
          git clone https://github.com/an-anime-team/sleepy-launcher ../sleepy

      - name: Install dependencies
        run: |
          set -e
          sudo apt install python3-tomlkit python3-aiohttp

      - name: Generate Cargo sources
        run: |
          python3 ../builder-tools/cargo/flatpak-cargo-generator.py ../sleepy/Cargo.lock -o cargo-sources.json
          
      - name: Update YML
        uses: mikefarah/yq@master
        with:
          cmd: yq -i '.modules[3].sources[0].tag = "${{ inputs.tag }}"' moe.launcher.sleepy-launcher.yml

      - name: Commit changes
        run: |
          git config user.email "$GIT_AUTHOR_EMAIL"
          git config user.name "$GIT_AUTHOR_NAME"

          staged_files=`git diff --name-only --cached`
          if [[ -n $staged_files ]]; then
            git commit -m "Update sources"
            git push
          else
            echo "No sources changed, commit skipped"
          fi

